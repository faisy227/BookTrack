<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BookTrack - Reading Goals</title>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #ff2d75;
            --primary-light: #ff8cb3;
            --primary-dark: #d4004e;
            --secondary: #6c5ce7;
            --dark: #2d3436;
            --light: #f5f6fa;
            --gray: #dfe6e9;
            --success: #00b894;
            --warning: #fdcb6e;
            --danger: #d63031;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Syne', sans-serif;
        }

        body {
            background-color: var(--light);
            color: var(--dark);
            display: flex;
            min-height: 100vh;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        /* Button Style */
        .show-goals-btn {
            background-color: var(--primary);
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 30px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(255, 45, 117, 0.3);
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
        }

        .show-goals-btn:hover {
            background-color: var(--primary-dark);
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(255, 45, 117, 0.4);
        }

        .show-goals-btn i {
            margin-right: 10px;
            font-size: 20px;
        }

        /* Modal Overlay */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: rgba(0, 0, 0, 0.5);
            z-index: 1000;
            display: none;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .modal-overlay.active {
            display: block;
            opacity: 1;
        }

        /* Modal Content */
        .modal-content {
            position: fixed;
            top: 0;
            right: -100%;
            width: 90%;
            max-width: 600px;
            height: 100%;
            background-color: white;
            box-shadow: -5px 0 30px rgba(0, 0, 0, 0.1);
            z-index: 1001;
            overflow-y: auto;
            transition: right 0.4s cubic-bezier(0.25, 0.1, 0.25, 1);
            padding: 30px;
        }

        .modal-content.active {
            right: 0;
        }

        /* Modal Header */
        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 1px solid var(--gray);
        }

        .modal-header h2 {
            font-size: 28px;
            color: var(--primary);
            font-weight: 700;
            display: flex;
            align-items: center;
        }

        .modal-header h2 i {
            margin-right: 15px;
        }

        .close-btn {
            background: none;
            border: none;
            font-size: 24px;
            cursor: pointer;
            color: var(--dark);
            transition: all 0.2s;
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
        }

        .close-btn:hover {
            background-color: var(--gray);
            color: var(--primary);
        }

        /* Goal Card */
        .goal-card {
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            border-radius: 12px;
            padding: 25px;
            color: white;
            margin-bottom: 30px;
            position: relative;
            overflow: hidden;
        }

        .goal-card::before {
            content: '';
            position: absolute;
            top: -50px;
            right: -50px;
            width: 150px;
            height: 150px;
            background-color: rgba(255, 255, 255, 0.1);
            border-radius: 50%;
        }

        .goal-card h3 {
            font-size: 22px;
            font-weight: 700;
            margin-bottom: 20px;
            position: relative;
        }

        /* Form Styles */
        .goal-form {
            display: grid;
            gap: 20px;
        }

        .form-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 8px;
            color: var(--dark);
        }

        .goal-label {
            color: white;
            opacity: 0.9;
        }

        input[type="text"],
        input[type="number"],
        input[type="date"],
        select {
            width: 100%;
            padding: 12px 15px;
            border: 1px solid var(--gray);
            border-radius: 8px;
            font-size: 14px;
            transition: all 0.3s;
        }

        input[type="text"]:focus,
        input[type="number"]:focus,
        input[type="date"]:focus,
        select:focus {
            border-color: var(--primary);
            outline: none;
            box-shadow: 0 0 0 3px rgba(255, 45, 117, 0.1);
        }

        .goal-input {
            background-color: rgba(255, 255, 255, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: white;
        }

        .goal-input::placeholder {
            color: rgba(255, 255, 255, 0.7);
        }

        .goal-input:focus {
            border-color: white;
            box-shadow: 0 0 0 3px rgba(255, 255, 255, 0.2);
        }

        /* Goal Type Selector */
        .goal-type-selector {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        .goal-type {
            flex: 1;
            text-align: center;
        }

        .goal-type input {
            display: none;
        }

        .goal-type label {
            display: block;
            padding: 12px;
            border: 1px solid var(--gray);
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: 600;
        }

        .goal-type input:checked + label {
            background-color: var(--primary);
            color: white;
            border-color: var(--primary);
        }

        /* Time Period */
        .time-period {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        /* Progress Preview */
        .progress-preview {
            margin-top: 20px;
        }

        .progress-bar {
            height: 8px;
            background-color: rgba(255, 255, 255, 0.3);
            border-radius: 4px;
            margin-bottom: 8px;
        }

        .progress-fill {
            height: 100%;
            border-radius: 4px;
            background-color: white;
            width: 0%;
            transition: width 0.5s ease;
        }

        .progress-text {
            display: flex;
            justify-content: space-between;
            font-size: 12px;
            opacity: 0.8;
        }

        /* Form Actions */
        .form-actions {
            display: flex;
            justify-content: flex-end;
            gap: 15px;
            margin-top: 30px;
        }

        .btn {
            padding: 12px 25px;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            border: none;
        }

        .btn-primary {
            background-color: var(--primary);
            color: white;
        }

        .btn-primary:hover {
            background-color: var(--primary-dark);
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(255, 45, 117, 0.3);
        }

        .btn-outline {
            background-color: transparent;
            border: 1px solid var(--gray);
            color: var(--dark);
        }

        .btn-outline:hover {
            border-color: var(--primary);
            color: var(--primary);
        }

        .btn-white {
            background-color: white;
            color: var(--primary);
        }

        .btn-white-outline {
            background-color: transparent;
            border: 1px solid white;
            color: white;
        }

        .btn-white-outline:hover {
            background-color: rgba(255, 255, 255, 0.1);
        }

        /* Responsive */
        @media (max-width: 768px) {
            .modal-content {
                width: 100%;
            }
            
            .time-period {
                grid-template-columns: 1fr;
            }
        }

        /* Icons */
        .icon-goal:before {
            content: "🎯";
        }

        .icon-close:before {
            content: "×";
        }

        .icon-book:before {
            content: "📖";
        }

        .icon-pages:before {
            content: "📄";
        }
    </style>
</head>
<body>
    <button class="show-goals-btn" id="showGoalsBtn">
        <i class="icon-goal"></i> Set Reading Goal
    </button>

    <!-- Modal Overlay -->
    <div class="modal-overlay" id="modalOverlay"></div>

    <!-- Modal Content -->
    <div class="modal-content" id="modalContent">
        <div class="modal-header">
            <h2><i class="icon-goal"></i> Reading Goals</h2>
            <button class="close-btn" id="closeBtn"><i class="icon-close"></i></button>
        </div>

        <div class="goal-card">
            <h3>2023 Reading Challenge</h3>
            <form class="goal-form" id="goalForm">
                <!-- Goal Type -->
                <div class="goal-type-selector">
                    <div class="goal-type">
                        <input type="radio" id="goal-books" name="goalType" value="books" checked>
                        <label for="goal-books"><i class="icon-book"></i> Books</label>
                    </div>
                    <div class="goal-type">
                        <input type="radio" id="goal-pages" name="goalType" value="pages">
                        <label for="goal-pages"><i class="icon-pages"></i> Pages</label>
                    </div>
                </div>

                <!-- Goal Target -->
                <div class="form-group">
                    <label for="goalTarget" class="goal-label">Target</label>
                    <input type="number" id="goalTarget" class="goal-input" placeholder="Enter your target" min="1" required>
                </div>

                <!-- Time Period -->
                <div class="time-period">
                    <div class="form-group">
                        <label for="startDate" class="goal-label">Start Date</label>
                        <input type="date" id="startDate" class="goal-input" required>
                    </div>
                    <div class="form-group">
                        <label for="endDate" class="goal-label">End Date</label>
                        <input type="date" id="endDate" class="goal-input" required>
                    </div>
                </div>

                <!-- Current Progress -->
                <div class="form-group">
                    <label for="currentProgress" class="goal-label">Current Progress (optional)</label>
                    <input type="number" id="currentProgress" class="goal-input" placeholder="Where are you now?" min="0">
                </div>

                <!-- Progress Preview -->
                <div class="progress-preview">
                    <div class="progress-bar">
                        <div class="progress-fill" id="progressFill"></div>
                    </div>
                    <div class="progress-text">
                        <span id="progressText">0%</span>
                        <span>Goal: <span id="goalTargetText">0</span></span>
                    </div>
                </div>

                <!-- Form Actions -->
                <div class="form-actions">
                    <button type="button" class="btn btn-white-outline" id="cancelBtn">Cancel</button>
                    <button type="submit" class="btn btn-white">Save Goal</button>
                </div>
            </form>
        </div>

        <!-- Previous Goals (optional section) -->
        <div class="previous-goals">
            <h3 style="color: var(--dark); margin-bottom: 15px;">Previous Goals</h3>
            <div class="previous-goal">
                <div style="display: flex; justify-content: space-between; margin-bottom: 5px;">
                    <strong>2022 Reading Challenge</strong>
                    <span>78% completed</span>
                </div>
                <div class="progress-bar" style="background-color: var(--gray);">
                    <div class="progress-fill" style="background-color: var(--primary); width: 78%;"></div>
                </div>
                <div style="display: flex; justify-content: space-between; font-size: 12px; color: #7f8c8d; margin-top: 5px;">
                    <span>28/36 books</span>
                    <span>Jan 1 - Dec 31, 2022</span>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Modal functionality
        const showGoalsBtn = document.getElementById('showGoalsBtn');
        const modalOverlay = document.getElementById('modalOverlay');
        const modalContent = document.getElementById('modalContent');
        const closeBtn = document.getElementById('closeBtn');
        const cancelBtn = document.getElementById('cancelBtn');

        showGoalsBtn.addEventListener('click', function() {
            modalOverlay.classList.add('active');
            modalContent.classList.add('active');
            document.body.style.overflow = 'hidden';
        });

        function closeModal() {
            modalOverlay.classList.remove('active');
            modalContent.classList.remove('active');
            document.body.style.overflow = 'auto';
        }

        modalOverlay.addEventListener('click', closeModal);
        closeBtn.addEventListener('click', closeModal);
        cancelBtn.addEventListener('click', closeModal);

        // Close modal when pressing Escape key
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape' && modalOverlay.classList.contains('active')) {
                closeModal();
            }
        });

        // Progress calculation
        const goalTarget = document.getElementById('goalTarget');
        const currentProgress = document.getElementById('currentProgress');
        const progressFill = document.getElementById('progressFill');
        const progressText = document.getElementById('progressText');
        const goalTargetText = document.getElementById('goalTargetText');

        function updateProgress() {
            const target = parseInt(goalTarget.value) || 0;
            const progress = parseInt(currentProgress.value) || 0;
            const percentage = target > 0 ? Math.min(Math.round((progress / target) * 100), 100) : 0;
            
            progressFill.style.width = `${percentage}%`;
            progressText.textContent = `${percentage}%`;
            goalTargetText.textContent = target;
        }

        goalTarget.addEventListener('input', updateProgress);
        currentProgress.addEventListener('input', updateProgress);

        // Form submission
        const goalForm = document.getElementById('goalForm');
        
        goalForm.addEventListener('submit', function(e) {
            e.preventDefault();
            
            // Here you would normally send the data to your backend
            // For this demo, we'll just show an alert and close the modal
            alert('Reading goal saved successfully!');
            closeModal();
            
            // Reset form
            goalForm.reset();
            progressFill.style.width = '0%';
            progressText.textContent = '0%';
            goalTargetText.textContent = '0';
        });

        // Initialize with current date
        document.getElementById('startDate').valueAsDate = new Date();
        const endDate = new Date();
        endDate.setFullYear(endDate.getFullYear() + 1);
        document.getElementById('endDate').valueAsDate = endDate;
    </script>
</body>
</html>
